<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Memory Game</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Orbitron:600">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css" integrity="sha384-5sAR7xN1Nv6T6+dT2mhtzEpVJvfS3NScPQTrOxhwjIuvcA67KV2R5Jz6kr4abQsz" crossorigin="anonymous">
  <link rel="stylesheet" href="stopWatch.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<script>if (!localStorage.getItem('lastPlayerName')) window.location.href = '../index.html';</script>
	<div id="timerContainer">
		<div class="timer">Cliquer sur une carte</div>
		<div class="timer" id="tempsABattre"></div>
		<div class="timer">
			<div>
				<button onclick="openConfig()"><i class="fas fa-cog fa-4x"></i></button>
				<button onclick="restartGame()"><i class="fas fa-redo fa-4x"></i></button>
				<button onclick="razMeilleurTemps()"><i class="fas fa-trash-alt fa-4x"></i></button>
			</div>
			<div class="version">v2026.04.01-11:56</div>
		</div>
	</div>

  <div id="leaderboard" class="leaderboard">
    <h3>Classement <span class="lb-size-tag" id="lbSizeTag">4×3</span></h3>
    <div class="lb-section">
      <div class="lb-section-title">Meilleur de tous les temps</div>
      <div id="allTimeScore" class="lb-alltime">—</div>
    </div>
    <div class="lb-section">
      <div class="lb-section-title">Top 3 du mois</div>
      <ol id="leaderboardList"><li class="lb-loading">Chargement…</li></ol>
    </div>
    <div class="lb-footer">
      <button class="lb-btn" onclick="refreshLeaderboard()">&#8635; Actualiser</button>
    </div>
    <div id="leaderboardStatus" class="lb-status"></div>
  </div>

  <div id="nameModal" class="name-modal">
    <div class="name-panel">
      <div class="name-trophy">&#127942;</div>
      <h2>Nouveau record&nbsp;!</h2>
      <p class="name-subtitle">Entrez votre nom pour enregistrer votre score</p>
      <input type="text" id="nameInput" class="name-input" placeholder="Votre nom" maxlength="30" />
      <div class="name-buttons">
        <button class="name-btn-skip" onclick="submitPlayerName(null)">Passer</button>
        <button class="name-btn-ok" onclick="submitPlayerName()">Valider</button>
      </div>
    </div>
  </div>

  <div id="configModal" class="config-modal">
    <div class="config-panel">
      <button class="config-close" onclick="document.getElementById('configModal').classList.remove('open')">✕</button>
      <h2>Taille du jeu</h2>
      <div class="config-buttons">
        <button id="btn-2x2" onclick="selectSize(2,2)">2×2</button>
        <button id="btn-4x3" onclick="selectSize(4,3)" class="active">4×3</button>
        <button id="btn-4x4" onclick="selectSize(4,4)">4×4</button>
        <button id="btn-6x6" onclick="selectSize(6,6)">6×6</button>
        <button id="btn-8x8" onclick="selectSize(8,8)">8×8</button>
      </div>
      <div class="config-sliders">
        <label>Animation retournement : <span id="flipDurationVal">0.30s</span>
          <input type="range" min="0.05" max="1.5" step="0.05" value="0.3"
                 oninput="updateFlipDuration(this.value)">
        </label>
        <label>Délai avant retournement : <span id="unflipDelayVal">800ms</span>
          <input type="range" min="0" max="3000" step="100" value="800"
                 oninput="updateUnflipDelay(this.value)">
        </label>
      </div>
    </div>
  </div>

  <section class="memory-game"></section>

  <script type="text/javascript" src="stopWatch.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="record.js"></script>
  <script src="scripts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/party-js@latest/bundle/party.min.js"></script>
</body>
</html>
